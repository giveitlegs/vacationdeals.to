<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <!-- Icon: Location pin with sun/horizon inside -->
  <g transform="translate(0, 2)">
    <!-- Pin body -->
    <path d="M22 4C14.268 4 8 10.268 8 18c0 9.5 14 24 14 24s14-14.5 14-24c0-7.732-6.268-14-14-14z" fill="#2563EB"/>
    <!-- Sun circle -->
    <circle cx="22" cy="16" r="5.5" fill="#FBBF24"/>
    <!-- Horizon line inside pin -->
    <path d="M13 20h18" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Small waves below horizon -->
    <path d="M15 22.5c1.5-1 3-1 4.5 0s3 1 4.5 0" stroke="white" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  </g>
  <!-- Text: VacationDeals -->
  <text x="48" y="33" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#2563EB">Vacation</tspan><tspan fill="#1E293B">Deals</tspan>
  </text>
  <!-- .to accent -->
  <text x="232" y="33" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#94A3B8">.to</text>
</svg>
